# Run `pre-commit autoupdate` to update the hook versions.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # ruff's UP (pyupgrade) rules enforce Python 3.10+ idioms; the standalone
  # pyupgrade hook is no longer needed.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
