[tox]
envlist =
    py{310, 311, 312, 313, 314}-sqlalchemy{14, 2}
    ruff
labels =
    update = update-{requirements, pre-commit}

[testenv]
commands = pytest
dependency_groups = test
passenv =
    DB
    DATABASE_URL
deps =
    sqlalchemy14: SQLAlchemy>=1.4,<2.0
    sqlalchemy2: SQLAlchemy>=2.0
setenv =
    SQLALCHEMY_WARN_20 = true
    # deps and dependency_groups are installed in separate resolutions;
    # the constraint keeps the group install from upgrading SQLAlchemy.
    sqlalchemy14: PIP_CONSTRAINT = {toxinidir}/constraints-sqlalchemy14.txt
recreate = True

[testenv:ruff]
skip_install = True
recreate = False
deps = pre-commit
commands =
    pre-commit run --all-files ruff-check
    pre-commit run --all-files ruff-format
