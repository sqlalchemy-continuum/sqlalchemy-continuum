name: Publish

on:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8
      - name: Build distributions
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # Publishing is a separate job so the build step never sees the OIDC
  # token. Requires a PyPI "trusted publisher" configured for this repo,
  # workflow file publish.yml, and environment pypi.
  publish-to-pypi:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/SQLAlchemy-Continuum
    permissions:
      id-token: write  # mandatory for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
