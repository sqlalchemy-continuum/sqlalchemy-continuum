name: "Test"

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '40 1 * * 3'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8
      - name: Set up Python
        run: uv python install
      - name: Create virtual environment
        run: uv venv
      - name: Install dependencies
        run: uv pip install -e . --group dev
      - name: Run ruff check
        run: uv run ruff check
      - name: Run ruff format
        run: uv run ruff format --check

  test:
    name: test-python${{ matrix.python-version }}-sa${{ matrix.sqlalchemy-version }}-${{ matrix.db-engine }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        sqlalchemy-version:
          - ">=1.4,<2.0"
          - ">=2.0"
        db-engine:
          - sqlite
          - postgres
          - postgres-native
          - mysql
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: main
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 3
      postgres:
        image: postgres
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: main
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 2s
          --health-retries 3
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv pip install -e . --group test
          uv pip install 'sqlalchemy${{ matrix.sqlalchemy-version }}'
      - name: Run tests
        run: uv run pytest
        env:
          DB: ${{ matrix.db-engine }}

  # Aggregation job so branch protection only needs one required check.
  all-green:
    name: all-green
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
