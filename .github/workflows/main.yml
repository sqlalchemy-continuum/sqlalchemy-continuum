name: "Test"

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  schedule:
    - cron: '40 1 * * 3'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Create virtual environment
        run: uv venv
      - name: Install ruff
        run: uv pip install --group lint
      - name: Run ruff check
        run: uv run --no-sync ruff check
      - name: Run ruff format
        run: uv run --no-sync ruff format --check

  test:
    name: test-python${{ matrix.python-version }}-sa${{ matrix.sqlalchemy-version }}-${{ matrix.db-engine }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        sqlalchemy-version:
          - ">=1.4,<2.0"
          - ">=2.0"
        db-engine:
          - sqlite
          - postgres
          - postgres-native
          - mysql
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      # Generous health-check windows: a cold MySQL start on a busy runner
      # regularly exceeds 15s, and a container that never turns healthy
      # fails the whole job before tests even run — including sqlite legs
      # that don't use it.
      mysql:
        image: mysql:9
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: main
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-start-period 30s
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      postgres:
        image: postgres:17
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: main
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install dependencies
        # Single resolution so the SQLAlchemy pin constrains the test
        # group (Flask-SQLAlchemy 3.1+ would otherwise drag in SQLAlchemy 2.x).
        run: uv pip install -e . --group test 'sqlalchemy${{ matrix.sqlalchemy-version }}'
      - name: Run tests
        # --no-sync keeps uv run from re-syncing uv.lock over the
        # matrix-pinned SQLAlchemy version.
        run: uv run --no-sync pytest
        env:
          DB: ${{ matrix.db-engine }}

  # Aggregation job so branch protection only needs one required check.
  all-green:
    name: all-green
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
